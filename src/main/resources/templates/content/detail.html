<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>콘텐츠 상세</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/navbar :: navbar(${tenantId})}"></div>

<div class="container mt-4" style="max-width: 700px;">
  <div class="mb-4">
    <a th:href="@{/content}" class="text-decoration-none text-muted">← 목록으로</a>
    <h3 class="fw-bold mt-2">콘텐츠 상세</h3>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <dl class="row mb-0">
        <dt class="col-sm-4 text-muted">ID</dt>
        <dd class="col-sm-8" th:text="'#' + ${content.id}">1</dd>

        <dt class="col-sm-4 text-muted">테넌트</dt>
        <dd class="col-sm-8">
          <span class="badge bg-secondary" th:text="${tenantId}">tenant</span>
        </dd>

        <dt class="col-sm-4 text-muted">제목</dt>
        <dd class="col-sm-8 fw-medium" th:text="${content.title}">제목</dd>

        <dt class="col-sm-4 text-muted">상태</dt>
        <dd class="col-sm-8">
          <span class="badge"
                th:classappend="${content.status == 'READY'} ? 'bg-warning text-dark' :
                               (${content.status == 'PROCESSING'} ? 'bg-primary' : 'bg-success')"
                th:text="${content.status}">READY</span>
        </dd>

        <dt class="col-sm-4 text-muted">Extra Data (JSON)</dt>
        <dd class="col-sm-8">
          <pre class="bg-light p-2 rounded small mb-0"
               th:text="${content.extraData != null ? content.extraData : '없음'}"></pre>
        </dd>

        <dt class="col-sm-4 text-muted">버전 (OL)</dt>
        <dd class="col-sm-8 text-muted small" th:text="${content.version}">0</dd>

        <dt class="col-sm-4 text-muted">생성일시</dt>
        <dd class="col-sm-8 text-muted small"
            th:text="${#temporals.format(content.createdAt, 'yyyy-MM-dd HH:mm:ss')}">-</dd>

        <dt class="col-sm-4 text-muted">수정일시</dt>
        <dd class="col-sm-8 text-muted small"
            th:text="${#temporals.format(content.updatedAt, 'yyyy-MM-dd HH:mm:ss')}">-</dd>
      </dl>
    </div>
  </div>

  <div class="mt-3">
    <a th:href="@{/lock-test}" class="btn btn-warning text-dark">
      🔒 이 콘텐츠로 Lock 테스트
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
