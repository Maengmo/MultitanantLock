<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>콘텐츠 등록 - 동적 폼</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/navbar :: navbar(${tenantId})}"></div>

<div class="container mt-4" style="max-width: 700px;">

  <div class="mb-4">
    <a th:href="@{/content}" class="text-decoration-none text-muted">← 목록으로</a>
    <h3 class="fw-bold mt-2 mb-1">✏️ 콘텐츠 등록</h3>
  </div>

  <!-- 동적 폼 설명 배너 -->
  <div class="alert alert-info mb-4">
    <strong>🎨 동적 폼 렌더링 (TB_FORM_DEFINITION)</strong><br>
    <span class="text-muted">
      테넌트 <strong th:text="${tenantId}">tenant</strong>의 폼 정의를 DB에서 읽어 아래 필드를 동적으로 생성합니다.
      다른 테넌트는 다른 필드가 표시됩니다.
    </span>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">

      <div th:if="${#lists.isEmpty(fields)}" class="alert alert-warning">
        이 테넌트에 등록된 폼 정의가 없습니다.
        <br><small>Header: <code>X-Tenant-Id: townboard</code> 또는 <code>X-Tenant-Id: joongang</code></small>
      </div>

      <form th:action="@{/content}" method="post" th:unless="${#lists.isEmpty(fields)}">

        <!-- 폼 정의에서 동적으로 필드 생성 -->
        <div th:each="field : ${fields}" class="mb-3">
          <label class="form-label fw-medium">
            <span th:text="${field.label}">Label</span>
            <span th:if="${field.required}" class="text-danger ms-1">*</span>
            <small class="text-muted ms-2 fw-normal"
                   th:text="'(' + ${field.fieldType} + ')'"></small>
          </label>

          <!-- text 타입 -->
          <input th:if="${field.fieldType == 'text'}"
                 type="text"
                 th:name="${field.fieldKey == 'title' ? 'title' : 'extra_' + field.fieldKey}"
                 class="form-control"
                 th:required="${field.required}"
                 th:placeholder="${field.label}">

          <!-- number 타입 -->
          <input th:if="${field.fieldType == 'number'}"
                 type="number"
                 th:name="'extra_' + ${field.fieldKey}"
                 class="form-control"
                 th:required="${field.required}"
                 min="0">

          <!-- date 타입 -->
          <input th:if="${field.fieldType == 'date'}"
                 type="date"
                 th:name="'extra_' + ${field.fieldKey}"
                 class="form-control"
                 th:required="${field.required}">

          <!-- select 타입 (displayType) -->
          <select th:if="${field.fieldType == 'select' and field.fieldKey == 'displayType'}"
                  th:name="'extra_' + ${field.fieldKey}"
                  class="form-select"
                  th:required="${field.required}">
            <option value="">선택하세요</option>
            <option value="banner">배너</option>
            <option value="popup">팝업</option>
            <option value="fullscreen">전체화면</option>
          </select>

          <!-- select 타입 (category) -->
          <select th:if="${field.fieldType == 'select' and field.fieldKey == 'category'}"
                  th:name="'extra_' + ${field.fieldKey}"
                  class="form-select"
                  th:required="${field.required}">
            <option value="">선택하세요</option>
            <option value="정치">정치</option>
            <option value="경제">경제</option>
            <option value="사회">사회</option>
            <option value="문화">문화</option>
            <option value="스포츠">스포츠</option>
            <option value="IT">IT/과학</option>
          </select>
        </div>

        <!-- 필드 출처 정보 표시 -->
        <div class="mt-3 p-3 bg-light rounded small text-muted">
          <strong>📌 폼 필드 출처 (TB_FORM_DEFINITION)</strong>
          <ul class="mb-0 mt-1">
            <li th:each="f : ${fields}"
                th:text="${f.fieldKey} + ' [' + ${f.fieldType} + '] → ' + ${f.label}"></li>
          </ul>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary px-4">저장</button>
          <a th:href="@{/content}" class="btn btn-outline-secondary">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
